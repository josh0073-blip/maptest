name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      rollback_sha:
        description: 'Commit SHA to deploy (leave empty to deploy HEAD)'
        required: false
        default: ''

# Allow one concurrent deployment; cancel in-flight runs on the same branch.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target SHA
        id: sha
        run: |
          if [ -n "${{ github.event.inputs.rollback_sha }}" ]; then
            echo "sha=${{ github.event.inputs.rollback_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.sha.outputs.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
